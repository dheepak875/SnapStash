<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4F8EF7;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#38BDF8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#22D3EE;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="100" height="100" rx="22" fill="#0F172A"/>
  <rect x="4" y="4" width="92" height="92" rx="18" fill="url(#grad)" opacity="0.15"/>
  <!-- Camera body -->
  <rect x="24" y="34" width="52" height="38" rx="6" stroke="url(#grad)" stroke-width="3" fill="none"/>
  <!-- Lens -->
  <circle cx="50" cy="53" r="12" stroke="url(#grad)" stroke-width="3" fill="none"/>
  <circle cx="50" cy="53" r="5" fill="url(#grad)" opacity="0.5"/>
  <!-- Flash -->
  <rect x="34" y="28" width="14" height="8" rx="2" stroke="url(#grad)" stroke-width="2" fill="none"/>
  <!-- Stash arrow -->
  <path d="M50 70 L50 82 M44 76 L50 82 L56 76" stroke="url(#grad)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
